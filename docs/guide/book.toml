[book]
title = "Bovista Architecture Guide"
authors = ["Bovista Team"]
description = "Understanding Bovista's GPU-accelerated volumetric visualization architecture built with WGPU"
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "light"
preferred-dark-theme = "coal"
git-repository-url = "https://github.com/aganders3/bovista"
additional-css = ["custom.css"]
additional-js = ["custom.js"]
mathjax-support = false

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true

[output.html.playground]
editable = false
